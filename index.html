<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional MBTI Diagnostic System</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-e: #4a90e2; --color-i: #9013fe;
            --color-s: #10b981; --color-n: #34d399;
            --color-t: #f59e0b; --color-f: #fbbf24;
            --color-j: #ec4899; --color-p: #f472b6;
            --bg-body: #f0f2f5;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-body);
            color: #334155;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 650px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 공통 버튼 */
        .btn-primary {
            background-color: #3b82f6; color: white; border: none; padding: 18px 36px;
            font-size: 18px; font-weight: 700; border-radius: 50px; cursor: pointer;
            transition: 0.3s; width: 100%; font-family: inherit;
        }
        .btn-primary:hover { background-color: #2563eb; transform: translateY(-2px); }

        /* 화면 전환 */
        #quiz-screen, #result-screen { display: none; }

        /* 퀴즈 화면 */
        .progress-bar-wrap { width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: 0.3s; }
        .q-text { font-size: 22px; font-weight: 500; margin-bottom: 40px; line-height: 1.5; word-break: keep-all; }
        .answer-btn {
            display: block; width: 100%; padding: 20px; margin-bottom: 15px;
            background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 15px;
            font-size: 16px; cursor: pointer; transition: 0.2s; text-align: left;
        }
        .answer-btn:hover { border-color: #3b82f6; background: #eff6ff; }

        /* 결과 화면 */
        .result-header { margin-bottom: 30px; }
        .result-emoji { font-size: 80px; margin-bottom: 10px; }
        .result-title { font-size: 32px; font-weight: 700; color: #1e293b; margin: 0; }
        
        /* 세부 지표 차트 (개선된 부분) */
        .chart-section { background: #f8fafc; border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .chart-title { font-size: 16px; font-weight: 700; text-align: left; margin-bottom: 20px; color: #475569; }
        .indicator-row { display: flex; align-items: center; margin-bottom: 15px; font-size: 14px; font-weight: 700; }
        .indicator-label { width: 70px; text-align: center; }
        .bar-container { flex-grow: 1; height: 14px; background: #e2e8f0; border-radius: 20px; margin: 0 15px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; width: 100%; transition: 1s ease-in-out; }
        
        /* 상세 분석 */
        .analysis-card { text-align: left; background: #fff; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .analysis-card h3 { margin-top: 0; font-size: 16px; color: #1e293b; border-left: 4px solid #3b82f6; padding-left: 10px; margin-bottom: 10px; }
        .analysis-card p { font-size: 14px; line-height: 1.6; color: #475569; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <div style="font-size: 100px; margin-bottom: 20px;">🕵️‍♂️</div>
        <h1 style="font-size: 30px;">정밀 성격 유형 진단</h1>
        <p style="color: #64748b; margin-bottom: 40px; line-height: 1.6;">
            32개의 전문 문항을 통해 당신의 심리 지표를 분석합니다.<br>
            각 성향의 백분율(%)과 심층 리포트를 확인하세요.
        </p>
        <button class="btn-primary" onclick="startTest()">진단 시작하기</button>
    </div>

    <div id="quiz-screen">
        <div class="progress-bar-wrap">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="progress-text" style="font-size: 14px; color: #3b82f6; font-weight: 700; margin-bottom: 10px; text-align: right;">1 / 32</div>
        <div class="q-text" id="question">질문 로딩 중...</div>
        <button class="answer-btn" id="btn-A" onclick="handleChoice('A')"></button>
        <button class="answer-btn" id="btn-B" onclick="handleChoice('B')"></button>
    </div>

    <div id="result-screen">
        <div class="result-header">
            <div class="result-emoji" id="result-emoji"></div>
            <h2 class="result-title" id="result-name"></h2>
            <p id="result-summary" style="color: #64748b; margin-top: 10px;"></p>
        </div>

        <div class="chart-section">
            <div class="chart-title">세부 성향 지표 (%)</div>
            
            <div class="indicator-row">
                <span class="indicator-label" style="color: var(--color-e)">외향 (E)</span>
                <div class="bar-container">
                    <div class="bar-fill" id="bar-EI"></div>
                </div>
                <span class="indicator-label" style="color: var(--color-i)">내향 (I)</span>
            </div>

            <div class="indicator-row">
                <span class="indicator-label" style="color: var(--color-s)">감각 (S)</span>
                <div class="bar-container">
                    <div class="bar-fill" id="bar-SN"></div>
                </div>
                <span class="indicator-label" style="color: var(--color-n)">직관 (N)</span>
            </div>

            <div class="indicator-row">
                <span class="indicator-label" style="color: var(--color-t)">사고 (T)</span>
                <div class="bar-container">
                    <div class="bar-fill" id="bar-TF"></div>
                </div>
                <span class="indicator-label" style="color: var(--color-f)">감정 (F)</span>
            </div>

            <div class="indicator-row">
                <span class="indicator-label" style="color: var(--color-j)">판단 (J)</span>
                <div class="bar-container">
                    <div class="bar-fill" id="bar-JP"></div>
                </div>
                <span class="indicator-label" style="color: var(--color-p)">인식 (P)</span>
            </div>
        </div>

        <div class="analysis-section">
            <div class="analysis-card">
                <h3>주요 강점 (Strengths)</h3>
                <p id="res-pros"></p>
            </div>
            <div class="analysis-card">
                <h3>보완할 점 (Blind Spots)</h3>
                <p id="res-cons"></p>
            </div>
            <div class="analysis-card">
                <h3>전문가 조언 (Action Plan)</h3>
                <p id="res-advice"></p>
            </div>
        </div>

        <button class="btn-primary" style="margin-top: 20px;" onclick="location.reload()">다시 진단하기</button>
    </div>
</div>

<script>
    // 질문 데이터 (E/I, S/N, T/F, J/P 각 8문항 총 32문항)
    const questions = [
        { q: "새로운 사람들과 만나는 파티나 모임에서 나는?", a: "먼저 인사를 건네며 대화를 주도하고 에너지를 얻는다", b: "조용히 지켜보다가 누군가 말을 걸면 대답하며 조심스럽게 어울린다", type: "EI" },
        { q: "주말에 휴식을 취할 때 나는?", a: "친구를 만나거나 밖으로 나가 활동적인 일을 하는 것을 선호한다", b: "집에서 책을 보거나 영화를 보며 나만의 평온한 시간을 즐긴다", type: "EI" },
        { q: "대화할 때 나의 스타일은?", a: "생각나는 대로 바로바로 말하며 활기차게 소통하는 편이다", b: "머릿속으로 내용을 충분히 정리한 뒤 신중하게 말하는 편이다", type: "EI" },
        { q: "업무나 과제를 수행할 때?", a: "여러 사람과 의견을 나누며 협업할 때 능률이 오른다", b: "혼자 집중할 수 있는 환경에서 독립적으로 일할 때 능률이 오른다", type: "EI" },
        { q: "사람들은 나를 어떻게 생각하나요?", a: "사교적이고 열정적이며 표현이 풍부한 사람", b: "진중하고 차분하며 자신의 영역을 중시하는 사람", type: "EI" },
        { q: "엘리베이터에서 모르는 사람과 마주치면?", a: "날씨 이야기라도 가볍게 건네며 어색함을 깬다", b: "인사만 가볍게 하거나 조용히 층수 표시만 바라본다", type: "EI" },
        { q: "스트레스를 풀 때 주로?", a: "친구들과 수다를 떨거나 시끌벅적한 장소에 간다", b: "조용한 곳에서 명상을 하거나 혼자만의 취미에 몰두한다", type: "EI" },
        { q: "대인 관계에서 나의 폭은?", a: "넓고 다양한 분야의 사람들과 두루두루 친하게 지낸다", b: "정말 마음이 맞는 소수의 사람들과 깊은 관계를 유지한다", type: "EI" },

        { q: "정보를 받아들일 때 나는?", a: "실제로 일어난 사실과 구체적인 데이터를 중시한다", b: "행간의 의미와 미래의 가능성, 비유적인 표현을 중시한다", type: "SN" },
        { q: "사과를 보면 떠오르는 생각은?", a: "빨갛다, 아삭하다, 비타민이 많다 (사실 위주)", b: "백설공주, 뉴턴, 애플 로고, 결실 (연상 위주)", type: "SN" },
        { q: "새로운 기술을 배울 때 선호하는 방식은?", a: "검증된 매뉴얼과 단계를 따라 차근차근 익히는 것", b: "전체적인 원리를 파악하고 내 직관에 따라 응용해보는 것", type: "SN" },
        { q: "길을 설명할 때 나는?", a: "50m 직진 후 오른쪽 편의점에서 꺾으라고 구체적으로 말한다", b: "저 앞 큰 건물 보일 때까지 가서 대충 오른쪽으로 가면 된다고 말한다", type: "SN" },
        { q: "내가 더 좋아하는 이야기는?", a: "실제로 겪은 경험담이나 현실적인 뉴스", b: "상상력을 자극하는 판타지 소설이나 미래 예측", type: "SN" },
        { q: "일을 할 때 나의 강점은?", a: "세부 사항을 놓치지 않고 꼼꼼하게 챙기는 실행력", b: "큰 그림을 그리고 새로운 아이디어를 내는 창의력", type: "SN" },
        { q: "어떤 물건을 살 때 나는?", a: "가격, 기능, 후기 등 실용적인 면을 철저히 분석한다", b: "디자인, 브랜드가 주는 느낌, 나만의 가치를 더 고려한다", type: "SN" },
        { q: "주변을 관찰할 때 나는?", a: "사람들의 옷차림, 간판 등 눈에 보이는 실체를 잘 기억한다", b: "전반적인 분위기나 그 상황이 주는 느낌을 잘 기억한다", type: "SN" },

        { q: "친구가 힘든 일을 털어놓을 때 나는?", a: "상황을 분석하고 현실적인 해결책을 먼저 제시한다", b: "친구가 느꼈을 감정에 공감하며 위로의 말을 먼저 건넨다", type: "TF" },
        { q: "의사결정을 할 때 기준은?", a: "객관적인 논리와 원칙, 그리고 효율성", b: "사람들과의 관계, 그리고 주변에 미칠 영향", type: "TF" },
        { q: "나를 더 기쁘게 하는 칭찬은?", a: "너 정말 일 처리 똑 부러지게 잘한다!", b: "너는 정말 따뜻하고 배려심 넘치는 사람이야!", type: "TF" },
        { q: "팀 프로젝트 중 실수가 발생했다면?", a: "잘잘못을 명확히 가리고 시스템적으로 보완한다", b: "동료가 상처받지 않게 다독이며 팀의 화합을 챙긴다", type: "TF" },
        { q: "영화를 보며 비평할 때 나는?", a: "스토리의 논리적 개연성과 사실 관계를 따진다", b: "작품이 주는 감동과 주인공의 감정선에 몰입한다", type: "TF" },
        { q: "친구가 '나 우울해서 화분 샀어'라고 하면?", a: "무슨 화분 샀어? 예뻐?", b: "왜 우울해? 무슨 일 있었어?", type: "TF" },
        { q: "누군가와 갈등이 생겼을 때?", a: "잘못된 점을 조목조목 짚고 시시비비를 가린다", b: "서로 서운한 점을 이야기하고 마음을 푸는 데 집중한다", type: "TF" },
        { q: "거절해야 하는 상황에서 나는?", a: "안 되는 이유를 명확하게 설명하고 단호히 거절한다", b: "상대방의 기분이 상할까 봐 돌려서 미안함을 표현한다", type: "TF" },

        { q: "여행 계획을 세울 때 나는?", a: "시간대별 방문 장소와 동선을 철저히 계획한다", b: "숙소만 정하고 그날그날 끌리는 대로 자유롭게 다닌다", type: "JP" },
        { q: "내 방의 책상 상태는?", a: "항상 일정한 규칙에 따라 깔끔하게 정리되어 있다", b: "어지러워 보이지만 나만의 규칙대로 배치되어 있다", type: "JP" },
        { q: "업무 마감 기한이 다가오면?", a: "미리미리 스케줄에 맞춰 여유롭게 끝내놓는다", b: "마지막 순간에 폭발적인 집중력을 발휘해 끝낸다", type: "JP" },
        { q: "친구와 약속을 잡을 때?", a: "몇 시에 어디서 만날지 미리 정확히 정해야 한다", b: "대략적인 시간만 정하고 당일에 연락해서 정한다", type: "JP" },
        { q: "예상치 못한 변수가 발생하면?", a: "계획이 틀어지는 것이 싫어서 스트레스를 받는다", b: "그럴 수도 있지! 유연하게 상황에 맞춰 대처한다", type: "JP" },
        { q: "마트에서 장을 볼 때 나는?", a: "미리 적어둔 쇼핑 리스트대로만 빠르게 구매한다", b: "돌아다니며 세일 품목이나 맘에 드는 걸 즉석에서 산다", type: "JP" },
        { q: "외출 준비를 할 때 나는?", a: "입을 옷과 소지품을 미리 다 챙겨둬야 마음이 편하다", b: "나가기 직전에 옷장에서 보고 맘에 드는 걸 골라 입는다", type: "JP" },
        { q: "일을 처리하는 스타일은?", a: "한 번에 하나씩, 체계적으로 매듭을 지으며 나아간다", b: "여러 일을 동시에 하거나, 상황에 따라 순서를 바꾼다", type: "JP" }
    ];

    // 결과 데이터
    const resultDetails = {
        "ISTJ": { emoji: "📋", name: "ISTJ (신뢰의 원칙주의자)", summary: "책임감이 강하고 한 번 시작한 일은 끝까지 완수하는 성격입니다.", pros: "철저한 업무 처리, 약속 엄수, 뛰어난 인내심과 현실 감각.", cons: "변화에 대한 거부감, 융통성 부족, 타인의 감정에 무심해 보일 수 있음.", advice: "가끔은 정해진 규칙에서 벗어나 새로운 시각을 수용하려 노력해 보세요." },

    let currentIdx = 0;
    const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    function startTest() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        updateQuestion();
    }

    function updateQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${questions.length}`;
        document.getElementById('progress-fill').style.width = `${((currentIdx) / questions.length) * 100}%`;
        document.getElementById('question').innerText = q.q;
        document.getElementById('btn-A').innerText = q.a;
        document.getElementById('btn-B').innerText = q.b;
    }

    function handleChoice(choice) {
        const q = questions[currentIdx];
        const metric = q.type; // "EI", "SN" 등
        if (choice === 'A') { scores[metric.charAt(0)]++; } 
        else { scores[metric.charAt(1)]++; }

        currentIdx++;
        if (currentIdx < questions.length) {
            updateQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";

        const res = resultDetails[mbti];
        document.getElementById('result-emoji').innerText = res.emoji;
        document.getElementById('result-name').innerText = res.name;
        document.getElementById('result-summary').innerText = res.summary;
        document.getElementById('res-pros').innerText = res.pros;
        document.getElementById('res-cons').innerText = res.cons;
        document.getElementById('res-advice').innerText = res.advice;

        // 세부 지표 차트 업데이트 (백분율 계산)
        // 각 영역별 8문제이므로 (내 점수 / 8) * 100
        function updateBar(id, scoreA, scoreB, colorA, colorB) {
            const bar = document.getElementById(id);
            const percentA = (scoreA / 8) * 100;
            // 그라데이션 적용 (A 색상 % 지점부터 B 색상으로 급변하도록 설정)
            bar.style.background = `linear-gradient(to right, ${colorA} 0%, ${colorA} ${percentA}%, ${colorB} ${percentA}%, ${colorB} 100%)`;
        }

        updateBar('bar-EI', scores.E, scores.I, '#4a90e2', '#9013fe');
        updateBar('bar-SN', scores.S, scores.N, '#10b981', '#34d399');
        updateBar('bar-TF', scores.T, scores.F, '#f59e0b', '#fbbf24');
        updateBar('bar-JP', scores.J, scores.P, '#ec4899', '#f472b6');
    }
